# Non-secret and secret configuration for the Django application.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: lms
  labels:
    app.kubernetes.io/name: lms-web
    app.kubernetes.io/part-of: lms-platform
data:
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "lms.local,localhost,127.0.0.1"
  DJANGO_CSRF_TRUSTED_ORIGINS: "http://lms.local"
  # Service discovery names inside the namespace.
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "lms"
  POSTGRES_USER: "lms"
  REDIS_URL: "redis://redis:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  namespace: lms
  labels:
    app.kubernetes.io/name: lms-web
    app.kubernetes.io/part-of: lms-platform
type: Opaque
stringData:
  # Demo key — generate a fresh one for real use:
  #   python -c "import secrets; print(secrets.token_urlsafe(50))"
  DJANGO_SECRET_KEY: "k8s-demo-2f9c1b7a4e6d8a0c3b5e7f9a1c2d4e6f8a0b2c4d6e8f0a1b"
