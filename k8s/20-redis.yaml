# Redis backs the Channels layer used by the real-time chat (websockets).
# It is ephemeral for this app, so a plain Deployment is enough.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lms
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: lms-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: lms-platform
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lms
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: lms-platform
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
